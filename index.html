<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube-clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="nav-up">

        <div>
            <p><i class="bi bi-list"></i></p>
            <p>
                <i class="bi bi-youtube"></i>YoutubeBR
            </p>
        </div>
       
        <div class="search-bar">
            <input type="text" placeholder="Pesquisar">
            <p><i class="bi bi-search btn-mic"></i></p>
            <p><i class="bi bi-mic btn-mic"></i></p>
        </div>

        <div>
            <button class="button-creat">
                criar +
            </button>

            <button class="bell-button">
                <span class="bell-icon">🔔</span>
            </button>

            <p>canal</p>
        </div>

    </nav>
    <main>
        <img class="thumbnail" src="/img/banner youtube.jpg" alt="banner youtube">
    </main>
    <footer></footer>
</body>

</html>
