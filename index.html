<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube-clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="nav-left"></nav>


    <nav class="nav-up">

         <!-- PROGRESS MENU-LOGO CONTAINER -->
        <div class="menu-logo">
            <p>
                <i class="bi bi-list"></i>
            </p>

            <p>
                <i class="bi bi-youtube"></i> YouTube
            </p>
        </div>

        <!-- PROGRESS SEARCH CONTAINER -->
        <article class="search-container">

            <div class="search-bar">

                <input type="text" placeholder="Pesquisar">
                <div><i class="bi bi-search btn-mic"></i></div>

            </div>

            <div>
                <i class="bi bi-mic btn-mic"></i>
            </div>

        </article>

         <!-- PROGRESS ICON-CREATED-BELL CONTAINER -->
        <div>
            <button class="button-creat">
                criar +
            </button>

            <button class="">
                <i class="bi bi-bell bell-button"></i>
            </button>

            <img class="nav-youtube-channel" src="/img/perfil youtube.jpg" alt="youtube logo">
        </div>

    </nav>
    <main>
         <img class="thumbnail" src="/img/banner_youtube.jpg" alt="banner youtube">
         <img class="main-youtube-channel" src="/img/perfil youtube.jpg" alt="youtube logo">
    </main>

</body>

</html>
