<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube-clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-item">
            <i class="bi bi-house-fill"></i>
            <span>Início</span>
        </div>
        <div class="sidebar-item">
            <i class="bi bi-collection-play"></i>
            <span>Shorts</span>
        </div>
        <div class="sidebar-item">
            <i class="bi bi-play-circle"></i>
            <span>Inscrições</span>
        </div>
        <div class="sidebar-item">
            <i class="bi bi-person-video3"></i>
            <span>Você</span>
        </div>
    </aside>

    <!-- START NAV -->
    <nav class="nav-up">
        <!-- ESQUERDA -->
        <div class="menu-logo">
            <div class="nav-icon">
                <i class="bi bi-list" style="font-size: 22px;"></i>
            </div>
            <div class="logo-yt">
                <i class="bi bi-youtube" style="color: red; font-size: 24px;"></i>
                <span class="logo-text">YouTube <sup style="font-size: 9px;">BR</sup></span>
            </div>
        </div>

        <!-- CENTRO -->
        <div class="search-container">
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar">
                <div class="btn-keyboard">
                    <i class="bi bi-keyboard"></i>
                </div>
            </div>
            <div class="nav-icon">
                <i class="bi bi-search"></i>
            </div>
            <div class="nav-icon">
                <i class="bi bi-mic"></i>
            </div>
        </div>

        <!-- DIREITA -->
        <div class="nav-right">
            <button class="button-creat">
                <i class="bi bi-plus-lg"></i> Criar
            </button>
            <div class="nav-icon bell-wrapper">
                <i class="bi bi-bell"></i>
                <span class="bell-badge">9+</span>
            </div>
            <img class="nav-youtube-channel" src="/img/perfil youtube.jpg" alt="avatar">
        </div>
    </nav>
    <!-- END NAV -->

    <main>
        <img class="thumbnail" src="/img/banner_youtube.jpg" alt="banner youtube">
        <div class="main-container-logo">

            <div class="main-container-logo">
                <img class="main-youtube-channel" src="/img/perfil youtube.jpg" alt="youtube logo">
                <div class="main-info">
                    <h1>KaumonzinhoJR</h1>
                    <h2>@KaumonzinhoJR · 1.2M inscritos · 13 vídeos</h2>
                    <p>Faço live todos os dias na ROXINHA <strong>...mais</strong></p>
                    <a href="twitch.tv/sonofkaumon"
                        style="color: #3ea6ff; font-family: Arial; font-size: 0.9em;">twitch.tv/sonofkaumon</a>
                    <div class="main-buttons">
                        <button class="button-creat">Personalizar o canal</button>
                        <button class="button-creat">Gerenciar vídeos</button>

                    </div>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
