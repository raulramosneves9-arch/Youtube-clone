<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube-clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="nav-left"></nav>

    <!-- START NAV -->
    <nav class="nav-up">

        <!-- PROGRESS MENU-LOGO CONTAINER -->
        <div class="menu-logo">
            <p>
                <i class="bi bi-list list-iconi"></i>
            </p>

            <p class="icon-youtube">
                <i class="bi bi-youtube"></i> YouTube
            </p>
        </div>

        <!-- PROGRESS SEARCH CONTAINER -->
        <article class="search-container">
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar">
            </div>

            <div class="nav-icon">
                <i class="bi bi-search"></i>
            </div>

            <div class="nav-icon">
                <i class="bi bi-mic"></i>
            </div>
        </article>

        <!-- PROGRESS ICON-CREATED-BELL CONTAINER -->
        <div class="nav-right">
            <button class="button-creat">
                <i class="bi bi-plus-circle"></i> Criar
            </button>

            <div class="nav-icon">
                <i class="bi bi-bell bell-icon"></i>
            </div>

            <img class="nav-youtube-channel" src="/img/perfil youtube.jpg" alt="youtube logo">
        </div>
        <!-- END NAV -->
    </nav>
    <main>
        <img class="thumbnail" src="/img/banner_youtube.jpg" alt="banner youtube">
        <img class="main-youtube-channel" src="/img/perfil youtube.jpg" alt="youtube logo">
    </main>

</body>

</html>
